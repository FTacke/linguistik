[project]

site_name = "Linguistik im Spanischunterricht"
site_description = "Digitales Lehrbuch zur linguistischen Fundierung des Spanischunterrichts für (angehende) Lehrkräfte."
site_keywords = "Spanischunterricht, Linguistik, Sprachvariation, Plurizentrik, Lehrkräftebildung, Spanischdidaktik"

site_author = "Felix Tacke"
site_url = "https://linguistik.hispanistica.com/"

copyright = """
© 2026 Philipps-Universität Marburg · Felix Tacke · 
<a href="https://hispanistica.com" target="_blank" rel="noopener">Hispanistica @ Marburg</a> · 
<a href="/impressum/">Impressum</a>
"""

nav = [
  {"Titel & Vorwort"                        = "index.md"},
  {"Einleitung"                   = "einleitung.md"},
  {"1 Fehlerlinguistik"           = "fehlerlinguistik.md"},
  {"2 Aussprache"                 = "aussprache.md"},
  {"3 Orthographie"               = "orthographie.md"},
  {"4 Lexikalische Kreativität"   = "kreativitaet.md"},
  {"5 Variation & Plurizentrik"   = [
    {"5.1 Variation & Plurizentrik"             = "variation/variation_plurizentrik.md"},
    {"5.2 Variation in der Aussprache"          = "variation/variation_aussprache.md"},
    {"5.3 Variation in der Anrede"              = "variation/variation_anrede.md"},
    {"5.4 Variation in der Grammatik" = "variation/variation_grammatik.md"}
  ]},
  {"6 Sprachwandel"               = "wandel.md"},
  {"7 Herkunftssprachen"          = "herkunftssprachen.md"},
  {"X Admonitions"                = "admonitions.md"},
  {"Anhang"                        = "anhang.md"},
]

extra_css = [
  "assets/styles/00_tokens.css",
  "assets/styles/10_typography.css",
  "assets/styles/20_book.css",
  "assets/styles/25_cover.css",
  "assets/styles/30_components.css",
  "assets/vendor/leaflet/leaflet.css",
  "assets/styles/40_custom.css",
  "assets/styles/50_map.css",
]

extra_javascript = [
  "assets/javascripts/base_path.js",
  "assets/javascripts/audio_src_fixup.js",
  "assets/vendor/leaflet/leaflet.js",
  "assets/javascripts/map_ui.js",
  "assets/javascripts/map.js",
  "assets/javascripts/map_countries.js",
  "assets/javascripts/map_variation_tempora.js",
  "assets/javascripts/cite-copy.js",
  "assets/javascripts/external-links.js",
]

[project.theme]
custom_dir = "overrides"
favicon = "images/favicon.png"
language = "de"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Wechsel zu Dunkelmodus"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Wechsel zu Hellmodus"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.extra]

generator = false

[[project.extra.social]]
icon = "fontawesome/brands/creative-commons"
link = "/lizenz/"

[project.extra.analytics]
prod_domain = "linguistik.hispanistica.com"

[project.extra.analytics.goatcounter]
endpoint = "https://linguistik.goatcounter.com/count"
script_src = "//gc.zgo.at/count.js"
